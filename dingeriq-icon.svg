<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Dark background with rounded corners (iOS clips automatically) -->
  <rect width="192" height="192" rx="42" fill="#0f1117"/>
  
  <!-- Amber glow behind baseball -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f0a500" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#f0a500" stop-opacity="0"/>
  </radialGradient>
  <circle cx="96" cy="82" r="72" fill="url(#glow)"/>
  
  <!-- Speed streak lines (left side, amber) -->
  <line x1="14" y1="72"  x2="48" y2="72"  stroke="#f0a500" stroke-width="5"   stroke-linecap="round" opacity="0.3"/>
  <line x1="10" y1="84"  x2="50" y2="84"  stroke="#f0a500" stroke-width="7"   stroke-linecap="round" opacity="0.55"/>
  <line x1="14" y1="96"  x2="46" y2="96"  stroke="#f0a500" stroke-width="5"   stroke-linecap="round" opacity="0.3"/>
  
  <!-- Baseball (white circle) -->
  <circle cx="106" cy="84" r="52" fill="white" filter="url(#shadow)"/>
  
  <!-- Baseball shadow/depth -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Baseball left stitch curve -->
  <path d="M84 56 Q76 84 84 112" stroke="#cc2222" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Left stitch cross marks -->
  <line x1="79" y1="64"  x2="87" y2="64"  stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <line x1="77" y1="74"  x2="85" y2="74"  stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <line x1="77" y1="84"  x2="85" y2="84"  stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <line x1="77" y1="94"  x2="85" y2="94"  stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <line x1="79" y1="104" x2="87" y2="104" stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Baseball right stitch curve -->
  <path d="M128 56 Q136 84 128 112" stroke="#cc2222" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Right stitch cross marks -->
  <line x1="125" y1="64"  x2="133" y2="64"  stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <line x1="127" y1="74"  x2="135" y2="74"  stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <line x1="127" y1="84"  x2="135" y2="84"  stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <line x1="127" y1="94"  x2="135" y2="94"  stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <line x1="125" y1="104" x2="133" y2="104" stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  
  <!-- DINGER text -->
  <text x="96" y="158" 
    font-family="Inter,system-ui,-apple-system,sans-serif" 
    font-size="26" font-weight="900" 
    fill="white" 
    text-anchor="middle" 
    letter-spacing="-0.5">DINGER</text>
  
  <!-- IQ in amber -->
  <text x="96" y="178" 
    font-family="Inter,system-ui,-apple-system,sans-serif" 
    font-size="15" font-weight="700" 
    fill="#f0a500" 
    text-anchor="middle" 
    letter-spacing="6">IQ</text>
</svg>